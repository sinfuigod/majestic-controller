<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Controller</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #3a3a3a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 20px;
        }
        .btn {
            background-color: #00f3c5;
            color: #3a3a3a;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #00bfa3;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>ТЕСТ ПУЛЬТА</h1>
    <button class="btn" onclick="sendTest('w')">ИДТИ ВПЕРЕД (W)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendTest(cmd) {
            // Отправляем команду встроенным методом самого Телеграма
            tg.sendData(cmd);
        }
    </script>
</body>
</html>
