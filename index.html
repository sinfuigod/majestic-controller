<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Controller</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            color: #00ff88;
            margin: 15px 0 5px 0;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Блок макросов (верхняя панель) */
        .macro-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 400px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .macro-btn {
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            border: 1px solid #333;
            color: #fff;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .macro-btn:active {
            transform: scale(0.95);
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        .macro-btn.status { border-color: #00e5ff; }
        .macro-btn.status:active { background: #00e5ff; color: #000; box-shadow: 0 0 15px #00e5ff; }

        .macro-btn.stop { border-color: #ff1744; }
        .macro-btn.stop:active { background: #ff1744; color: #fff; box-shadow: 0 0 15px #ff1744; }

        /* Игровой пульт (джойстики) */
        .gamepad-zone {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        /* Крестовина D-PAD (Ходьба) */
        .dpad {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .dpad-btn {
            position: absolute;
            background: #252525;
            border: 2px solid #3c3c3c;
            border-radius: 8px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #aaa;
        }

        .dpad-btn:active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .dpad-up { top: 0; left: 47px; border-bottom: none; border-radius: 8px 8px 0 0; }
        .dpad-down { bottom: 0; left: 47px; border-top: none; border-radius: 0 0 8px 8px; }
        .dpad-left { top: 47px; left: 0; border-right: none; border-radius: 8px 0 0 8px; }
        .dpad-right { top: 47px; right: 0; border-left: none; border-radius: 0 8px 8px 0; }
        .dpad-center { top: 47px; left: 47px; width: 45px; height: 45px; background: #1a1a1a; border: 2px solid #3c3c3c; border-radius: 0; z-index: 1; pointer-events: none;}

        /* Стик камеры (Мышка) */
        .camera-stick {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .cam-btn {
            position: absolute;
            background: radial-gradient(circle, #292929, #1f1f1f);
            border: 2px solid #00e5ff;
            color: #00e5ff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 5px rgba(0, 229, 255, 0.2);
        }

        .cam-btn:active {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 15px #00e5ff;
        }

        .cam-up { top: 0; left: 47px; }
        .cam-down { bottom: 0; left: 47px; }
        .cam-left { top: 47px; left: 0; }
        .cam-right { top: 47px; right: 0; }
        .cam-center { top: 47px; left: 47px; width: 45px; height: 45px; background: #111; border: 1px dashed #00e5ff; border-radius: 50%; pointer-events: none; opacity: 0.3; }

    </style>
</head>
<body>

    <h2>Majestic Farm Control</h2>

    <div class="macro-container">
        <button class="macro-btn status" onclick="sendCmd('status')">ℹ️ Статус</button>
        <button class="macro-btn" onclick="sendCmd('feed')">🍔 Покормить</button>
        <button class="macro-btn" onclick="sendCmd('wheel')">🎡 Колесо</button>
        <button class="macro-btn" onclick="sendCmd('stats')">📊 Стата 1 мин</button>
        <button class="macro-btn" style="border-color:#00ff88;" onclick="sendCmd('start_afk')">🚀 Включить АФК</button>
        <button class="macro-btn stop" onclick="sendCmd('stop_afk')">🛑 Стоп АФК</button>
    </div>

    <div class="gamepad-zone">
        
        <div class="dpad">
            <div class="dpad-btn dpad-up" onclick="sendCmd('w')">▲</div>
            <div class="dpad-btn dpad-left" onclick="sendCmd('a')">◀</div>
            <div class="dpad-btn dpad-center"></div>
            <div class="dpad-btn dpad-right" onclick="sendCmd('d')">▶</div>
            <div class="dpad-btn dpad-down" onclick="sendCmd('s')">▼</div>
        </div>

        <div class="camera-stick">
            <div class="cam-btn cam-up" onclick="sendCmd('look_up')">👁️▲</div>
            <div class="cam-btn cam-left" onclick="sendCmd('look_left')">👁️◀</div>
            <div class="cam-btn cam-center"></div>
            <div class="cam-btn cam-right" onclick="sendCmd('look_right')">👁️▶</div>
            <div class="cam-btn cam-down" onclick="sendCmd('look_down')">👁️▼</div>
        </div>

    </div>

    <script>
        // Инициализация Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем окно на максимум на экране смартфона
        
        // Включаем легкую вибрацию на телефоне при открытии пульта (для сочности)
        if (tg.HapticFeedback) {
            tg.HapticFeedback.notificationOccurred('success');
        }

        // КРИТИЧЕСКАЯ ФУНКЦИЯ: отправляет команду и НЕ ЗАКРЫВАЕТ пульт
        function sendCmd(command) {
            try {
                tg.sendData(command); // Отправляем текстовый триггер в наш Python-скрипт
                
                // Легкая вибрация телефона при каждом нажатии кнопок
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            } catch (error) {
                console.error("Ошибка отправки данных в Телеграм: ", error);
            }
        }
    </script>
</body>
</html>
