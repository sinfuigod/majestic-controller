<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            touch-action: none; /* Полностью блокируем системные свайпы телефона везде */
        }
        body {
            background-color: #3a3a3a;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 15px;
            overflow: hidden;
        }
        /* Сетка кнопок сверху */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            touch-action: auto; /* Разрешаем обычные клики для кнопок */
        }
        .action-btn {
            background-color: #00f3c5;
            color: #3a3a3a;
            border: none;
            padding: 16px 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0px #00bfa3;
            transition: all 0.05s ease;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        /* Нижняя зона геймпада */
        .controls-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 35px;
            padding: 0 10px;
        }
        /* Крестовина (D-pad) */
        .d-pad {
            position: relative;
            width: 150px;
            height: 150px;
        }
        .d-btn {
            position: absolute;
            background-color: #00f3c5;
            cursor: pointer;
            box-shadow: 0 3px 0px #00bfa3;
        }
        .d-btn:active {
            background-color: #00bfa3;
            box-shadow: none;
        }
        .d-up { width: 46px; height: 55px; top: 0; left: 52px; border-radius: 12px 12px 6px 6px; }
        .d-down { width: 46px; height: 55px; bottom: 0; left: 52px; border-radius: 6px 6px 12px 12px; }
        .d-left { width: 55px; height: 46px; top: 52px; left: 0; border-radius: 12px 6px 6px 12px; }
        .d-right { width: 55px; height: 46px; top: 52px; right: 0; border-radius: 6px 12px 12px 6px; }
        
        /* Зона джойстика камеры */
        .joystick-zone {
            width: 150px;
            height: 150px;
            background-color: #00a88f;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
        }
        /* Внутренний подвижный стик жестко по центру */
        .joystick-center {
            width: 70px;
            height: 70px;
            background-color: #00f3c5;
            border-radius: 50%;
            position: absolute;
            top: 40px; /* (150px - 70px) / 2 */
            left: 40px; /* (150px - 70px) / 2 */
            box-shadow: 0 4px 0px #00bfa3;
            transform: translate(0px, 0px);
        }
    </style>
</head>
<body>

    <div class="button-grid">
        <button class="action-btn" onclick="sendCmd('feed')">🍔 Покормить</button>
        <button class="action-btn" onclick="sendCmd('wheel')">🎡 Крутить колесо</button>
        <button class="action-btn" onclick="sendCmd('stats')">📊 Статистика 1 мин</button>
        <button class="action-btn" onclick="sendCmd('stop_afk')">🛑 Остановить АФК</button>
        <button class="action-btn" onclick="sendCmd('start_afk')">🚀 Включить АФК</button>
        <button class="action-btn" onclick="sendCmd('status')">ℹ️ Проверить статус</button>
    </div>

    <div class="controls-container">
        <div class="d-pad">
            <div class="d-btn d-up" onclick="sendCmd('w')"></div>
            <div class="d-btn d-left" onclick="sendCmd('a')"></div>
            <div class="d-btn d-right" onclick="sendCmd('d')"></div>
            <div class="d-btn d-down" onclick="sendCmd('s')"></div>
        </div>

        <div class="joystick-zone" id="joyZone">
            <div class="joystick-center" id="joyStick"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendCmd(commandName) {
            tg.sendData(commandName);
        }

        const zone = document.getElementById('joyZone');
        const stick = document.getElementById('joyStick');
        
        const maxDistance = 40; // Ограничение выхода за границы (px)
        let startX = 0;
        let startY = 0;
        let lastCommandTime = 0;

        // Обработка начала касания
        zone.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Блокируем стандартное поведение браузера
            const rect = zone.getBoundingClientRect();
            // Находим точные координаты центра большого круга на экране
            startX = rect.left + rect.width / 2;
            startY = rect.top + rect.height / 2;
            stick.style.transition = 'none';
        }, { passive: false });

        // Обработка движения пальца
        zone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            
            // Считаем сдвиг относительно центра большого круга
            let posX = touch.clientX - startX;
            let posY = touch.clientY - startY;
            
            let distance = Math.sqrt(posX * posX + posY * posY);
            
            // Если палец вышел за пределы, удерживаем бегунок внутри
            if (distance > maxDistance) {
                posX = (posX / distance) * maxDistance;
                posY = (posY / distance) * maxDistance;
                distance = maxDistance;
            }
            
            // Сдвигаем стик через translate
            stick.style.transform = `translate(${posX}px, ${posY}px)`;

            // Отправляем команды направления боту в ТГ (не чаще чем раз в 200 мс)
            let now = Date.now();
            if (now - lastCommandTime > 200 && distance > 15) {
                lastCommandTime = now;
                
                if (Math.abs(posX) > Math.abs(posY)) {
                    if (posX > 0) sendCmd('look_right');
                    else sendCmd('look_left');
                } else {
                    if (posY > 0) sendCmd('look_down');
                    else sendCmd('look_up');
                }
            }
        }, { passive: false });

        // Возврат в центр при отпускании пальца
        zone.addEventListener('touchend', (e) => {
            e.preventDefault();
            stick.style.transition = 'transform 0.15s ease-out';
            stick.style.transform = 'translate(0px, 0px)';
        }, { passive: false });
    </script>
</body>
</html>
