<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #3a3a3a;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 15px;
            overflow: hidden;
        }
        /* Сетка функциональных кнопок сверху (как на 1ц2ц.png) */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .action-btn {
            background-color: #00f3c5;
            color: #3a3a3a;
            border: none;
            padding: 16px 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0px #00bfa3;
            transition: all 0.05s ease;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        /* Нижняя зона геймпада */
        .controls-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        /* Крестовина (D-pad) слева */
        .d-pad {
            position: relative;
            width: 150px;
            height: 150px;
        }
        .d-btn {
            position: absolute;
            background-color: #00f3c5;
            cursor: pointer;
            box-shadow: 0 3px 0px #00bfa3;
        }
        .d-btn:active {
            background-color: #00bfa3;
            box-shadow: none;
        }
        .d-up { width: 46px; height: 55px; top: 0; left: 52px; border-radius: 12px 12px 6px 6px; }
        .d-down { width: 46px; height: 55px; bottom: 0; left: 52px; border-radius: 6px 6px 12px 12px; }
        .d-left { width: 55px; height: 46px; top: 52px; left: 0; border-radius: 12px 6px 6px 12px; }
        .d-right { width: 55px; height: 46px; top: 52px; right: 0; border-radius: 6px 12px 12px 6px; }
        
        /* Стик камеры справа */
        .joystick-zone {
            width: 150px;
            height: 150px;
            background-color: #00a88f;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
        }
        .joystick-center {
            width: 75px;
            height: 75px;
            background-color: #00f3c5;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0px #00bfa3;
        }
        .joystick-center:active {
            background-color: #00bfa3;
            box-shadow: none;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <!-- Функциональные кнопки сверху -->
    <div class="button-grid">
        <button class="action-btn" onclick="sendCmd('feed')">🍔 Покормить</button>
        <button class="action-btn" onclick="sendCmd('wheel')">🎡 Крутить колесо</button>
        <button class="action-btn" onclick="sendCmd('stats')">📊 Статистика 1 мин</button>
        <button class="action-btn" onclick="sendCmd('stop_afk')">🛑 Остановить АФК</button>
        <button class="action-btn" onclick="sendCmd('start_afk')">🚀 Включить АФК</button>
        <button class="action-btn" onclick="sendCmd('status')">ℹ️ Проверить статус</button>
    </div>

    <!-- Джойстики снизу -->
    <div class="controls-container">
        <!-- Крестик ходьбы -->
        <div class="d-pad">
            <div class="d-btn d-up" onclick="sendCmd('w')"></div>
            <div class="d-btn d-left" onclick="sendCmd('a')"></div>
            <div class="d-btn d-right" onclick="sendCmd('d')"></div>
            <div class="d-btn d-down" onclick="sendCmd('s')"></div>
        </div>

        <!-- Круг камеры -->
        <div class="joystick-zone">
            <div class="joystick-center" onclick="sendCmd('look_around')"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем WebApp на максимум вверх

        function sendCmd(commandName) {
            // Отправляем команду в чат боту. Страница НЕ закроется, можно кликать дальше!
            tg.sendData(commandName);
        }
    </script>
</body>
</html>
