<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic TG Fixed Controller</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; touch-action: none; }
        body { background-color: #3a3a3a; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 15px; overflow: hidden; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .action-btn { background-color: #00f3c5; color: #3a3a3a; border: none; padding: 16px 8px; font-size: 13px; font-weight: bold; text-align: center; text-transform: uppercase; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 0px #00bfa3; }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .controls-container { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 35px; padding: 0 10px; }
        .d-pad { position: relative; width: 150px; height: 150px; }
        .d-btn { position: absolute; background-color: #00f3c5; cursor: pointer; box-shadow: 0 3px 0px #00bfa3; }
        .d-btn:active { background-color: #00bfa3; box-shadow: none; }
        .d-up { width: 46px; height: 55px; top: 0; left: 52px; border-radius: 12px 12px 6px 6px; }
        .d-down { width: 46px; height: 55px; bottom: 0; left: 52px; border-radius: 6px 6px 12px 12px; }
        .d-left { width: 55px; height: 46px; top: 52px; left: 0; border-radius: 12px 6px 6px 12px; }
        .d-right { width: 55px; height: 46px; top: 52px; right: 0; border-radius: 6px 12px 12px 6px; }
        .joystick-zone { width: 150px; height: 150px; background-color: #00a88f; border-radius: 50%; position: relative; }
        .joystick-center { width: 70px; height: 70px; background-color: #00f3c5; border-radius: 50%; position: absolute; top: 40px; left: 40px; }
    </style>
</head>
<body>

    <div class="button-grid">
        <button class="action-btn" onclick="sendCmd('feed')">🍔 Покормить</button>
        <button class="action-btn" onclick="sendCmd('wheel')">🎡 Крутить колесо</button>
        <button class="action-btn" onclick="sendCmd('stats')">📊 Статистика</button>
        <button class="action-btn" onclick="sendCmd('stop_afk')">🛑 Стоп АФК</button>
        <button class="action-btn" onclick="sendCmd('start_afk')">🚀 Старт АФК</button>
    </div>

    <div class="controls-container">
        <div class="d-pad">
            <div class="d-btn d-up" onclick="sendCmd('w')"></div>
            <div class="d-btn d-left" onclick="sendCmd('a')"></div>
            <div class="d-btn d-right" onclick="sendCmd('d')"></div>
            <div class="d-btn d-down" onclick="sendCmd('s')"></div>
        </div>
        <div class="joystick-zone" id="joyZone">
            <div class="joystick-center" id="joyStick"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendCmd(commandName) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Отправляем строго от ТВОЕГО имени
            tg.sendData(commandName);
            
            // Хак, чтобы предотвратить закрытие WebApp окна в Telegram
            window.addEventListener('blur', function() {
                setTimeout(function() {
                    window.focus();
                }, 1);
            }, { once: true });
        }

        // Логика джойстика камеры
        const zone = document.getElementById('joyZone');
        const stick = document.getElementById('joyStick');
        const maxDistance = 40;
        let startX = 0; let startY = 0;
        let lastCommandTime = 0;

        zone.addEventListener('touchstart', (e) => {
            const rect = zone.getBoundingClientRect();
            startX = rect.left + rect.width / 2;
            startY = rect.top + rect.height / 2;
        });

        zone.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            let posX = touch.clientX - startX;
            let posY = touch.clientY - startY;
            let distance = Math.sqrt(posX * posX + posY * posY);
            if (distance > maxDistance) { posX = (posX / distance) * maxDistance; posY = (posY / distance) * maxDistance; distance = maxDistance; }
            stick.style.transform = `translate(${posX}px, ${posY}px)`;

            let now = Date.now();
            if (now - lastCommandTime > 250 && distance > 18) {
                lastCommandTime = now;
                if (Math.abs(posX) > Math.abs(posY)) {
                    if (posX > 0) sendCmd('look_right'); else sendCmd('look_left');
                } else {
                    if (posY > 0) sendCmd('look_down'); else sendCmd('look_up');
                }
            }
        });

        zone.addEventListener('touchend', () => { stick.style.transform = 'translate(0px, 0px)'; });
    </script>
</body>
</html>
